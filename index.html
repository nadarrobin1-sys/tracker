<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Proposal 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Comic Sans MS', cursive;
    overflow: hidden;
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 80px;
}

h1 {
    color: white;
    font-size: 1.8rem;
}

/* MESSAGE STYLE */
#message {
    color: black;
    font-size: 1.1rem;
    margin-top: 10px;
    min-height: 30px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(0,0,0,0.5);
}

/* BUTTONS */
.buttons {
    margin-top: 40px;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
}

button {
    padding: 10px 18px;
    font-size: 1rem;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

/* YES BUTTON */
#yesBtn {
    background-color: #ff4b5c;
    color: white;
}

/* NO BUTTON */
#noBtn {
    background-color: white;
    color: #ff4b5c;
}

/* runaway */
.runaway {
    position: absolute;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container" id="container">
    <h1>Epo ok solla pore nu 💖</h1>
    <div id="message"></div>

    <div class="buttons">
        <button id="noBtn">Adhu na solla mudiyadhu 😏</button>
        <button id="yesBtn" onclick="accepted()">Yes Ok 😍</button>
    </div>
</div>

<!-- SOUND -->
<audio id="ayyooSound" src="https://www.myinstants.com/media/sounds/ayyoo.mp3"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");
const container = document.getElementById("container");
const yesBtn = document.getElementById("yesBtn");
const sound = document.getElementById("ayyooSound");

let clickCount = 0;

const messages = [
    "Theriyame paturukom try again 😅",
    "Think again DD 😏",
    "Robin Nalla paiyan da 😭😭😭",
    "Oru chance kudu 🥹🥹"
];

function moveButton() {
    const containerRect = container.getBoundingClientRect();

    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const topLimit = containerRect.bottom;

    const maxX = window.innerWidth - btnWidth;
    const maxY = window.innerHeight - btnHeight;

    const x = Math.random() * maxX;
    const y = topLimit + Math.random() * (maxY - topLimit);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("click", () => {
    // play sound
    sound.currentTime = 0;
    sound.play();

    // message
    message.innerText = messages[clickCount % messages.length];

    clickCount++;

    // glow yes button stronger
    let glow = clickCount * 5;
    yesBtn.style.boxShadow = `0 0 ${glow}px rgba(255,0,80,0.8)`;

    // activate movement
    noBtn.classList.add("runaway");

    moveButton();
});

function accepted() {
    document.body.innerHTML = `
    <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        color:white;
        text-align:center;
    ">
        <h1>🤣🤣 April Fool Da 😅<br>Yenna Yes press pannita pola 😁😁😏</h1>
    </div>
    `;
}
</script>

</body>
  </html>
